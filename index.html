<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<style>
    body {
        margin: 0;
        font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        background: linear-gradient(135deg, #383634, #706964);
        color: rgb(255, 250, 244);
        text-align: center;
    }

    h1 {
        margin-top: 30px;
    }

    canvas {
        background: #000000;
        border: 3px solid rgba(57, 55, 55, 0.695);
        margin-top: 20px;
    }

    #score {
        font-size: 25px;
        margin-top: 10px;
    }

    button {
        padding: 10px 20px;
        margin-top: 10px;
        cursor: pointer;
        border: none;
        background: #4bb94f;
        color: white;
        border-radius: 5px;
    }

</style>
</head>

<body>

<h1>🐍 Snake Game 🐍</h1>
<div id="score">Score : 0</div>
<button onclick="start()">Start</button>

<br>
<canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");// le stylo pour dessiner en 2D
const box = 20;
let snake;
let direction;
let food;
let score;
let game;

function start() {
    snake = [{x: 200, y: 200}];
    direction = "RIGHT";
    score = 0;
    food = randomFood();

    clearInterval(game);
    game = setInterval(draw, 100);
}

function randomFood() {
    return {
        x: Math.floor(Math.random() * 20) * box,
        y: Math.floor(Math.random() * 20) * box
    };
}

document.addEventListener("keydown", changeDirection);

function changeDirection(event) {
    if (event.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    if (event.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
    if (event.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    if (event.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
}

function draw() {
    ctx.fillStyle = "#111";//choisir un couleur
    ctx.fillRect(0, 0, 400, 400);//dessiner un rect remplie 

    for (let i = 0; i < snake.length; i++) {//parcourir snake
        ctx.fillStyle = i === 0 ? "lime" : "green";//au debut lime puis vert
        ctx.fillRect(snake[i].x, snake[i].y, box, box);//dessiner chaque partie de snake (rect)
    }
    
    // Dessiner nourriture en rouge 
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    let headX = snake[0].x;
    let headY = snake[0].y;

    // Déplacement par ajout ou suppression 
    if (direction === "UP") headY -= box;
    if (direction === "DOWN") headY += box;
    if (direction === "LEFT") headX -= box;
    if (direction === "RIGHT") headX += box;
      
    // Manger nourriture
    if (headX === food.x && headY === food.y) {
        score++;
        food = randomFood();
    } else {
        snake.pop();//le serpent avance
    }

    let newHead = {x: headX, y: headY};

    // Collision
    if (
        headX < 0 || headX >= 400 ||
        headY < 0 || headY >= 400 ||
        collision(newHead, snake)
    ) {
        clearInterval(game);//clear the surface 
        saveScore(score);
        alert("Game Over! Score: " + score);
    }

    snake.unshift(newHead);//ajout new head 

    document.getElementById("score").innerText = "Score: " + score;//modifier le score courant
}

function collision(head, array) {
    return array.some(segment => segment.x === head.x && segment.y === head.y);//verifer le contact
}


function saveScore(score) {
    let best = localStorage.getItem("bestScore") || 0;// Sauvegarde score maximale
    if (score > best) {
        localStorage.setItem("bestScore", score);
        alert("Nouveau record !");
    }
}
</script>

</body>
</html>
